<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galería</title>

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;

}

body{

background:#111;
color:white;

}

header{

display:flex;
justify-content:space-between;
align-items:center;
padding:25px 60px;
background:#1a1a1a;

}

header h1{

font-size:28px;

}

.logout{

background:#ff3b30;
padding:12px 18px;
border-radius:8px;
color:white;
text-decoration:none;

}

.container{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

gap:30px;

padding:40px;

}

.card{

background:#1f1f1f;
border-radius:15px;
overflow:hidden;
transition:.25s;

}

.card:hover{

transform:translateY(-6px);

}

.card img{

width:100%;
height:180px;
object-fit:cover;

}

.info{

padding:20px;

}

.info h2{

margin-bottom:15px;

}

.info a{

display:inline-block;
margin-top:10px;
text-decoration:none;
background:#0066ff;
padding:12px 18px;
border-radius:8px;
color:white;

}

</style>

</head>

<body>

<header>

<h1>Mi Galería</h1>

<a href="/logout" class="logout">

Cerrar sesión

</a>

</header>

<div class="container">

<div class="card">

<img src="https://picsum.photos/600/400?1">

<div class="info">

<h2>Google</h2>

<a href="https://google.es" target="_blank">

Entrar

</a>

</div>

</div>

<div class="card">

<img src="https://picsum.photos/600/400?2">

<div class="info">

<h2>YouTube</h2>

<a href="https://youtube.com" target="_blank">

Entrar

</a>

</div>

</div>

<div class="card">

<img src="https://picsum.photos/600/400?3">

<div class="info">

<h2>GitHub</h2>

<a href="https://github.com" target="_blank">

Entrar

</a>

</div>

</div>

</div>

</body>
</html>
